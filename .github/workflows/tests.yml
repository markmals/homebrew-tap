name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        os: [macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Select Xcode 26.x
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "No Xcode 26.x found on $(sw_vers -productVersion). Available:"; ls -d /Applications/Xcode*.app
            exit 1
          fi
          sudo xcode-select -s "$XC/Contents/Developer"
          swift --version

      - name: Trust the tap
        run: brew trust --tap markmals/tap

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - name: Build bottles
        id: build-bottle
        if: github.event_name == 'pull_request'
        run: |
          brew test-bot \
            --skip-online-checks \
            --only-formulae \
            --skip-recursive-dependents
          # List created bottle files for debugging
          echo "Bottle files in current directory:"
          find . -name "*.bottle.*" -type f 2>/dev/null || true

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.os }}
          path: "**/*.bottle.*"
          if-no-files-found: warn
