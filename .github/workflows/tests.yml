name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

# Allow this tap (markmals/tap) to load in CI. test-bot's internal `brew doctor`
# fails on untrusted taps, and `brew trust` does not satisfy it; the only non-official
# tap here is our own, so there is no third-party tap to protect against. This is the
# convention real taps use (e.g. chenrui333/homebrew-tap, a Homebrew maintainer's tap).
env:
  HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Select Xcode 26.x
        if: runner.os == 'macOS'
        run: |
          XC=$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "No Xcode 26.x found on $(sw_vers -productVersion). Available:"
            find /Applications -maxdepth 1 -name 'Xcode*.app'
            exit 1
          fi
          sudo xcode-select -s "$XC/Contents/Developer"
          swift --version

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - name: Build bottles
        id: build-bottle
        if: github.event_name == 'pull_request'
        run: |
          brew test-bot \
            --skip-online-checks \
            --only-formulae \
            --skip-recursive-dependents
          # List created bottle files for debugging
          echo "Bottle files in current directory:"
          find . -name "*.bottle.*" -type f 2>/dev/null || true

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.os }}
          path: "**/*.bottle.*"
          if-no-files-found: warn
