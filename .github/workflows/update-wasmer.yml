name: Update Wasmer Formula

on:
  schedule:
    - cron: "0 12 * * *" # daily at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO_CONTEXT: ${{ github.repository }}
        run: |
          LATEST=$(gh api repos/wasmerio/wasmer/releases/latest --jq '.tag_name')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          # Extract current version from the formula (tag includes leading "v")
          CURRENT=$(curl -sf "https://raw.githubusercontent.com/${GH_REPO_CONTEXT}/main/Formula/wasmer.rb" \
            | grep -oP 'wasmer/releases/download/\K[^/]+' | head -1)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.up_to_date == 'false'
        uses: actions/checkout@v4

      - name: Update formula
        if: steps.check.outputs.up_to_date == 'false'
        env:
          TAG: ${{ steps.check.outputs.latest }}
        run: |
          ARM64_URL="https://github.com/wasmerio/wasmer/releases/download/${TAG}/wasmer-darwin-arm64.tar.gz"
          AMD64_URL="https://github.com/wasmerio/wasmer/releases/download/${TAG}/wasmer-darwin-amd64.tar.gz"

          ARM64_SHA=$(curl -sfL "$ARM64_URL" | shasum -a 256 | awk '{print $1}')
          AMD64_SHA=$(curl -sfL "$AMD64_URL" | shasum -a 256 | awk '{print $1}')

          if ! echo "$ARM64_SHA" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::Failed to compute ARM64 checksum"
            exit 1
          fi
          if ! echo "$AMD64_SHA" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::Failed to compute AMD64 checksum"
            exit 1
          fi

          # Extract old version tag from the formula
          OLD_TAG=$(grep -oP 'wasmer/releases/download/\K[^/]+' Formula/wasmer.rb | head -1)

          # Update version tag in URLs
          sed -i "s|${OLD_TAG}|${TAG}|g" Formula/wasmer.rb

          # Update the explicit version field (strip leading "v")
          VERSION="${TAG#v}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/wasmer.rb

          # Update checksums
          sed -i "/darwin-arm64/{n;s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/}" Formula/wasmer.rb
          sed -i "/darwin-amd64/{n;s/sha256 \".*\"/sha256 \"${AMD64_SHA}\"/}" Formula/wasmer.rb

      - name: Commit and push
        if: steps.check.outputs.up_to_date == 'false'
        env:
          TAG: ${{ steps.check.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/wasmer.rb
          git commit -m "wasmer: update to ${TAG}"
          git push
