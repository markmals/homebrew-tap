name: Update Wasmer Formula

on:
  schedule:
    - cron: "0 12 * * *" # daily at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO_CONTEXT: ${{ github.repository }}
        run: |
          LATEST=$(gh api repos/wasmerio/wasmer/releases/latest --jq '.tag_name')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          # Extract current version tag from the formula's source tarball URL
          CURRENT=$(curl -sf "https://raw.githubusercontent.com/${GH_REPO_CONTEXT}/main/Formula/wasmer.rb" \
            | grep -oP 'wasmer/archive/refs/tags/\Kv[^.]+\.[^.]+\.[^.]+(?=\.tar\.gz)')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.up_to_date == 'false'
        uses: actions/checkout@v4

      - name: Update formula
        if: steps.check.outputs.up_to_date == 'false'
        env:
          TAG: ${{ steps.check.outputs.latest }}
        run: |
          SOURCE_URL="https://github.com/wasmerio/wasmer/archive/refs/tags/${TAG}.tar.gz"
          SOURCE_SHA=$(curl -sfL "$SOURCE_URL" | shasum -a 256 | awk '{print $1}')

          if ! echo "$SOURCE_SHA" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::Failed to compute source tarball checksum"
            exit 1
          fi

          # Extract old version tag from the formula
          OLD_TAG=$(grep -oP 'wasmer/archive/refs/tags/\Kv[^.]+\.[^.]+\.[^.]+(?=\.tar\.gz)' Formula/wasmer.rb)

          # Update version tag in URL
          sed -i "s|${OLD_TAG}|${TAG}|g" Formula/wasmer.rb

          # Update source tarball checksum (the one right after the url line)
          sed -i "/archive\/refs\/tags/{ n; s/sha256 \".*\"/sha256 \"${SOURCE_SHA}\"/; }" Formula/wasmer.rb

      - name: Commit and push
        if: steps.check.outputs.up_to_date == 'false'
        env:
          TAG: ${{ steps.check.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/wasmer.rb
          git commit -m "wasmer: update to ${TAG}"
          git push
