name: Update Vite+ Formula

on:
  schedule:
    - cron: "0 12 * * *" # daily at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new version
        id: check
        run: |
          LATEST=$(curl -sf https://registry.npmjs.org/@voidzero-dev/vite-plus-cli-darwin-arm64 | jq -r '.["dist-tags"].latest')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          # Extract current version from the arm64 URL in the formula
          CURRENT=$(curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/main/Formula/vite-plus.rb" | grep -oP 'darwin-arm64-\K[\d.]+(?=\.tgz)')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.up_to_date == 'false'
        uses: actions/checkout@v4

      - name: Update formula
        if: steps.check.outputs.up_to_date == 'false'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          ARM64_URL="https://registry.npmjs.org/@voidzero-dev/vite-plus-cli-darwin-arm64/-/vite-plus-cli-darwin-arm64-${VERSION}.tgz"
          X64_URL="https://registry.npmjs.org/@voidzero-dev/vite-plus-cli-darwin-x64/-/vite-plus-cli-darwin-x64-${VERSION}.tgz"

          # Download both tarballs and compute checksums
          ARM64_SHA=$(curl -sfL "$ARM64_URL" | shasum -a 256 | awk '{print $1}')
          X64_SHA=$(curl -sfL "$X64_URL" | shasum -a 256 | awk '{print $1}')

          # Verify both checksums are valid (64 hex chars)
          if ! echo "$ARM64_SHA" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::Failed to compute ARM64 checksum"
            exit 1
          fi
          if ! echo "$X64_SHA" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::Failed to compute x64 checksum"
            exit 1
          fi

          # Extract current version from the formula
          OLD_VERSION=$(grep -oP 'darwin-arm64-\K[\d.]+(?=\.tgz)' Formula/vite-plus.rb)

          # Update version in URLs and checksums
          sed -i "s/${OLD_VERSION}/${VERSION}/g" Formula/vite-plus.rb
          sed -i "/darwin-arm64/{n;s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/}" Formula/vite-plus.rb
          sed -i "/darwin-x64/{n;s/sha256 \".*\"/sha256 \"${X64_SHA}\"/}" Formula/vite-plus.rb

      - name: Commit and push
        if: steps.check.outputs.up_to_date == 'false'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/vite-plus.rb
          git commit -m "vite-plus: update to ${VERSION}"
          git push
