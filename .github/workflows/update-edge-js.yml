name: Update Edge.js Formula

on:
  schedule:
    - cron: "0 12 * * *" # daily at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new version
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO_CONTEXT: ${{ github.repository }}
        run: |
          # Prefer stable releases; fall back to nightlies (mirrors the
          # installer script's resolve_release logic).
          STABLE=$(gh api repos/wasmerio/edgejs/releases/latest --jq '.tag_name' 2>/dev/null || true)

          if [ -n "$STABLE" ]; then
            REPO="wasmerio/edgejs"
            TAG="$STABLE"
          else
            # Nightlies: pick the first non-draft release
            TAG=$(gh api repos/wasmerio/edgejs-nightlies/releases --jq '[.[] | select(.draft != true)][0].tag_name' 2>/dev/null || true)
            REPO="wasmerio/edgejs-nightlies"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve any Edge.js release"
            exit 1
          fi

          echo "repo=$REPO"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"

          # Extract current version from the formula
          CURRENT=$(curl -sf "https://raw.githubusercontent.com/${GH_REPO_CONTEXT}/main/Formula/edge-js.rb" \
            | grep -oP '^\s*version "\K[^"]+')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$TAG" = "$CURRENT" ]; then
            echo "up_to_date=true"  >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.up_to_date == 'false'
        uses: actions/checkout@v4

      - name: Update formula
        if: steps.check.outputs.up_to_date == 'false'
        env:
          REPO: ${{ steps.check.outputs.repo }}
          TAG:  ${{ steps.check.outputs.tag }}
        run: |
          ASSET="edge-darwin-arm64.zip"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"

          SHA=$(curl -sfL "$DOWNLOAD_URL" | shasum -a 256 | awk '{print $1}')

          if ! echo "$SHA" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::Failed to compute checksum for ${ASSET}"
            exit 1
          fi

          # Update URL, version, and checksum
          sed -i "s|url \".*\"|url \"${DOWNLOAD_URL}\"|"           Formula/edge-js.rb
          sed -i "s|version \".*\"|version \"${TAG}\"|"            Formula/edge-js.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|"              Formula/edge-js.rb

      - name: Commit and push
        if: steps.check.outputs.up_to_date == 'false'
        env:
          TAG: ${{ steps.check.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/edge-js.rb
          git commit -m "edge-js: update to ${TAG}"
          git push
